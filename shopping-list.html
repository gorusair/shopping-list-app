<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f46e5;
    }

    .input-row button {
      padding: 12px 20px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #4338ca;
    }

    .input-row button:disabled {
      background: #a5b4fc;
      cursor: not-allowed;
    }

    .stats {
      font-size: 0.875rem;
      color: #718096;
      margin-bottom: 16px;
    }

    .stats span {
      font-weight: 600;
      color: #4f46e5;
    }

    ul {
      list-style: none;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid #f0f4f8;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:last-child {
      border-bottom: none;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid #cbd5e0;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .checkbox.checked {
      background: #4f46e5;
      border-color: #4f46e5;
    }

    .checkbox.checked::after {
      content: '';
      width: 6px;
      height: 10px;
      border: 2px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      transition: all 0.2s;
      word-break: break-all;
    }

    .item-text.done {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e0;
      font-size: 1.2rem;
      padding: 4px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.2s;
    }

    .delete-btn:hover {
      color: #e53e3e;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 40px 0;
      font-size: 0.95rem;
    }

    .clear-done {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      color: #718096;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-done:hover {
      border-color: #e53e3e;
      color: #e53e3e;
    }

    .loading {
      text-align: center;
      color: #a0aec0;
      padding: 40px 0;
      font-size: 0.95rem;
    }

    .error-msg {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      color: #c53030;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.875rem;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." />
      <button id="addBtn" onclick="addItem()">추가</button>
    </div>

    <div id="errorMsg" class="error-msg" style="display:none"></div>

    <p class="stats" id="stats"></p>

    <div id="loading" class="loading">불러오는 중...</div>

    <ul id="list"></ul>

    <p class="empty" id="empty" style="display:none">아직 아이템이 없어요.</p>

    <button class="clear-done" id="clearDoneBtn" style="display:none" onclick="clearDone()">
      완료된 항목 삭제
    </button>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL  = 'https://xzqoqfhccwemzpkfnicc.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6cW9xZmhjY3dlbXpwa2ZuaWNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4Nzc3NjQsImV4cCI6MjA5NjQ1Mzc2NH0.cYBJuptEHzMPZtbcIZZzr2mB29pbm1VJezvvnDgeZFk';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

    const input        = document.getElementById('itemInput');
    const list         = document.getElementById('list');
    const empty        = document.getElementById('empty');
    const stats        = document.getElementById('stats');
    const clearDoneBtn = document.getElementById('clearDoneBtn');
    const loadingEl    = document.getElementById('loading');
    const addBtn       = document.getElementById('addBtn');
    const errorMsg     = document.getElementById('errorMsg');

    let items = [];

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      setTimeout(() => { errorMsg.style.display = 'none'; }, 4000);
    }

    function render() {
      loadingEl.style.display = 'none';
      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        stats.textContent = '';
        clearDoneBtn.style.display = 'none';
        return;
      }

      empty.style.display = 'none';

      const done  = items.filter(i => i.checked).length;
      const total = items.length;
      stats.innerHTML = `총 <span>${total}</span>개 중 <span>${done}</span>개 완료`;
      clearDoneBtn.style.display = done > 0 ? 'block' : 'none';

      items.forEach(item => {
        const li  = document.createElement('li');
        li.className = 'item';

        const box = document.createElement('div');
        box.className = 'checkbox' + (item.checked ? ' checked' : '');
        box.onclick = () => toggle(item.id, item.checked);

        const text = document.createElement('span');
        text.className = 'item-text' + (item.checked ? ' done' : '');
        text.textContent = item.name;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '✕';
        del.title = '삭제';
        del.onclick = () => remove(item.id);

        li.append(box, text, del);
        list.appendChild(li);
      });
    }

    async function loadItems() {
      const { data, error } = await supabase
        .from('shopping_items')
        .select('*')
        .order('position', { ascending: false });

      if (error) {
        showError('데이터를 불러오지 못했습니다: ' + error.message);
        loadingEl.style.display = 'none';
        return;
      }

      items = data;
      render();
    }

    window.addItem = async function () {
      const name = input.value.trim();
      if (!name) return;

      addBtn.disabled = true;

      const maxPosition = items.length > 0 ? Math.max(...items.map(i => i.position)) + 1 : 0;

      const { data, error } = await supabase
        .from('shopping_items')
        .insert([{ name, checked: false, position: maxPosition }])
        .select()
        .single();

      addBtn.disabled = false;

      if (error) { showError('추가 실패: ' + error.message); return; }

      items.unshift(data);
      input.value = '';
      render();
      input.focus();
    };

    window.toggle = async function (id, currentChecked) {
      const { error } = await supabase
        .from('shopping_items')
        .update({ checked: !currentChecked })
        .eq('id', id);

      if (error) { showError('업데이트 실패: ' + error.message); return; }

      const item = items.find(i => i.id === id);
      if (item) item.checked = !currentChecked;
      render();
    };

    window.remove = async function (id) {
      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) { showError('삭제 실패: ' + error.message); return; }

      items = items.filter(i => i.id !== id);
      render();
    };

    window.clearDone = async function () {
      const doneIds = items.filter(i => i.checked).map(i => i.id);
      if (doneIds.length === 0) return;

      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .in('id', doneIds);

      if (error) { showError('삭제 실패: ' + error.message); return; }

      items = items.filter(i => !i.checked);
      render();
    };

    loadItems();
  </script>
</body>
</html>
